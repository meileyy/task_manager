<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender:    #e9e4ff;
      --lavender-dk: #b8a8ff;
      --mint:        #d5f5e3;
      --mint-dk:     #7ed9a4;
      --peach:       #ffe0d1;
      --peach-dk:    #ffb088;
      --yellow-soft: #fff5c2;
      --yellow-dk:   #9c7a00;
      --blue-soft:   #d8ecff;
      --blue-dk:     #1f5fa8;
      --green-soft:  #d4f5de;
      --green-dk:    #1f7a3d;
      --red-soft:    #ffdce0;
      --red-dk:      #c03650;
      --purple-soft: #ece4ff;
      --purple-dk:   #7457d1;
      --text:        #3a3550;
      --text-soft:   #6b6485;
      --glass:       rgba(255, 255, 255, 0.65);
      --glass-brd:   rgba(255, 255, 255, 0.8);
      --shadow-sm:   0 4px 14px rgba(140, 120, 200, 0.08);
      --shadow-md:   0 10px 30px rgba(140, 120, 200, 0.12);
      --shadow-lg:   0 20px 50px rgba(140, 120, 200, 0.18);
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 50px 20px;
      background:
        radial-gradient(circle at 15% 20%, var(--lavender) 0%, transparent 45%),
        radial-gradient(circle at 85% 15%, var(--peach) 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, var(--mint) 0%, transparent 50%),
        linear-gradient(135deg, #fdfbff 0%, #f6f4ff 100%);
      background-attachment: fixed;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header.app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 26px;
      margin-bottom: 30px;
    }
    header.app-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #8a6dff 0%, #ff8fa3 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-badge {
      font-size: 0.85rem;
      color: var(--text-soft);
      background: rgba(140, 120, 200, 0.1);
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 500;
    }
    .user-badge strong { color: var(--text); font-weight: 600; }

    .auth-header {
      text-align: center;
      margin-bottom: 35px;
    }
    .auth-header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #8a6dff 0%, #ff8fa3 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .auth-header p {
      color: var(--text-soft);
      font-size: 0.95rem;
      margin-top: 6px;
      font-weight: 400;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--glass-brd);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
    }

    /* ---------- Auth screen ---------- */
    .auth-wrapper {
      max-width: 420px;
      margin: 0 auto;
    }
    .auth-card {
      padding: 34px 32px;
    }
    .auth-tabs {
      display: flex;
      background: rgba(140, 120, 200, 0.08);
      padding: 5px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      border-radius: 999px;
      transition: all 0.25s ease;
    }
    .auth-tab.active {
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    .auth-form input { height: 48px; width: 100%; }
    .auth-form button { margin-top: 6px; }

    /* ---------- Add task form ---------- */
    .add-card {
      padding: 28px 30px;
      margin-bottom: 30px;
    }
    .add-card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .add-card h2::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bff, #ff9eb5);
    }

    #taskForm {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: stretch;
      width: 100%;
    }
    .form-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
      width: 100%;
      height: 48px;
    }
    #title       { flex: 1 1 0; min-width: 0; }
    #dueDate     { flex: 0 0 150px; color: var(--text-soft); }
    #dueDate:valid { color: var(--text); }
    #assignTo    { flex: 0 0 150px; }
    #status      { flex: 0 0 140px; }
    #taskForm .btn-add { flex: 0 0 auto; white-space: nowrap; height: 48px; }
    #description { flex: 1 1 0; min-width: 0; }

    input, select {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0 18px;
      border: 1.5px solid transparent;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      color: var(--text);
      transition: all 0.25s ease;
      outline: none;
      width: 100%;
    }
    input::placeholder { color: #a9a3c2; }
    input:focus, select:focus {
      border-color: var(--lavender-dk);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(184, 168, 255, 0.2);
    }

    button {
      font-family: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      border: none;
      cursor: pointer;
      padding: 13px 24px;
      border-radius: 999px;
      transition: all 0.25s ease;
      letter-spacing: 0.2px;
    }
    button:active { transform: scale(0.96); }

    .btn-add {
      background: linear-gradient(135deg, #a78bff 0%, #ff9eb5 100%);
      color: #fff;
      box-shadow: 0 8px 20px rgba(167, 139, 255, 0.35);
      height: 48px;
    }
    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(167, 139, 255, 0.45);
    }

    .btn-logout {
      background: var(--peach);
      color: #9c4a20;
      padding: 9px 18px;
      font-size: 0.82rem;
    }
    .btn-logout:hover {
      background: var(--peach-dk);
      color: #fff;
      box-shadow: 0 6px 16px rgba(255, 176, 136, 0.4);
    }

    .tasks {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .task-card {
      padding: 22px 26px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      animation: fadeIn 0.35s ease;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .task-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-info { min-width: 0; }
    .task-head {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .task-id {
      font-size: 0.72rem;
      color: var(--text-soft);
      background: rgba(140, 120, 200, 0.1);
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 500;
    }
    .task-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }
    .task-desc {
      font-size: 0.88rem;
      color: var(--text-soft);
      line-height: 1.5;
      word-break: break-word;
    }

    .task-meta {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .task-due {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 999px;
      background: rgba(140, 120, 200, 0.08);
    }
    .task-due.future   { color: #8a869c; }
    .task-due.today    { color: #c46a1a; background: #fff0dd; }
    .task-due.overdue  { color: var(--red-dk); background: var(--red-soft); }

    .task-assignee {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--purple-soft);
      color: var(--purple-dk);
    }

    .badge {
      display: inline-block;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: capitalize;
      letter-spacing: 0.3px;
    }
    .badge.status-pending     { background: var(--yellow-soft); color: var(--yellow-dk); }
    .badge.status-in-progress { background: var(--blue-soft);   color: var(--blue-dk); }
    .badge.status-done        { background: var(--green-soft);  color: var(--green-dk); }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .actions button {
      padding: 9px 16px;
      font-size: 0.78rem;
    }
    .btn-status {
      background: var(--purple-soft);
      color: var(--purple-dk);
    }
    .btn-status:hover {
      background: #ddd1ff;
      box-shadow: 0 6px 16px rgba(116, 87, 209, 0.2);
    }
    .btn-delete {
      background: var(--red-soft);
      color: var(--red-dk);
    }
    .btn-delete:hover {
      background: #ffc9d1;
      box-shadow: 0 6px 16px rgba(192, 54, 80, 0.2);
    }

    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-soft);
      font-style: italic;
    }
    .empty::before {
      content: "✨";
      display: block;
      font-size: 2rem;
      margin-bottom: 10px;
      font-style: normal;
    }

    .message {
      padding: 12px 18px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.25s ease;
    }
    .message.error   { background: var(--red-soft);   color: var(--red-dk); }
    .message.success { background: var(--green-soft); color: var(--green-dk); }

    .hidden { display: none !important; }

    @media (max-width: 640px) {
      body { padding: 30px 14px; }
      .auth-header h1 { font-size: 1.9rem; }
      .form-row { flex-wrap: wrap; }
      .form-row > * { flex: 1 1 100% !important; }
      .task-card { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      header.app-header { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- ================= AUTH SCREEN ================= -->
  <div id="authScreen" class="container auth-wrapper">
    <div class="auth-header">
      <h1>Task Manager</h1>
      <p>Sign in to organize your day, softly.</p>
    </div>

    <div class="glass-card auth-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-mode="login">Login</button>
        <button type="button" class="auth-tab" data-mode="register">Register</button>
      </div>

      <div id="authMessage" class="message"></div>

      <form id="loginForm" class="auth-form">
        <input type="text" id="loginUsername" placeholder="Username" required autocomplete="username" />
        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password" />
        <button type="submit" class="btn-add">Login</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <input type="text" id="registerUsername" placeholder="Choose a username" required autocomplete="username" />
        <input type="password" id="registerPassword" placeholder="Choose a password (min 4 chars)" required autocomplete="new-password" />
        <button type="submit" class="btn-add">Create account</button>
      </form>
    </div>
  </div>

  <!-- ================= TASK SCREEN ================= -->
  <div id="taskScreen" class="container hidden">
    <header class="app-header glass-card">
      <h1>Task Manager</h1>
      <div class="user-area">
        <span class="user-badge">Hi, <strong id="usernameLabel"></strong></span>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </header>

    <div id="taskMessage" class="message"></div>

    <section class="glass-card add-card">
      <h2>Add a new task</h2>
      <form id="taskForm">
        <div class="form-row">
          <input type="text" id="title" placeholder="Title" required />
          <input type="date" id="dueDate" title="Due Date" aria-label="Due Date" />
          <select id="assignTo" title="Assign To" aria-label="Assign To">
            <option value="">Unassigned</option>
          </select>
          <select id="status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-row">
          <input type="text" id="description" placeholder="Description (optional)" />
          <button type="submit" class="btn-add">+ Add Task</button>
        </div>
      </form>
    </section>

    <section class="tasks" id="taskList"></section>
  </div>

  <script>
    const API = "https://task-manager-xbzm.onrender.com";
    const STATUS_CYCLE = ["pending", "in-progress", "done"];
    const TOKEN_KEY = "taskmanager_token";
    const USER_KEY  = "taskmanager_username";
    const UID_KEY   = "taskmanager_user_id";

    // --- Screen elements ---
    const authScreen = document.getElementById("authScreen");
    const taskScreen = document.getElementById("taskScreen");

    // --- Auth elements ---
    const loginForm       = document.getElementById("loginForm");
    const registerForm    = document.getElementById("registerForm");
    const authMessage     = document.getElementById("authMessage");
    const authTabs        = document.querySelectorAll(".auth-tab");

    // --- Task elements ---
    const taskForm      = document.getElementById("taskForm");
    const taskList      = document.getElementById("taskList");
    const taskMessage   = document.getElementById("taskMessage");
    const usernameLabel = document.getElementById("usernameLabel");
    const logoutBtn     = document.getElementById("logoutBtn");

    // =========================================================
    // Token helpers
    // =========================================================
    const getToken    = () => localStorage.getItem(TOKEN_KEY);
    const setToken    = (t) => localStorage.setItem(TOKEN_KEY, t);
    const clearToken  = () => {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
      localStorage.removeItem(UID_KEY);
    };
    const getUsername = () => localStorage.getItem(USER_KEY);
    const setUsername = (u) => localStorage.setItem(USER_KEY, u);
    const getUserId   = () => {
      const v = localStorage.getItem(UID_KEY);
      return v ? parseInt(v, 10) : null;
    };
    const setUserId   = (id) => localStorage.setItem(UID_KEY, String(id));

    function authHeaders(extra = {}) {
      return { ...extra, Authorization: `Bearer ${getToken()}` };
    }

    // =========================================================
    // Messaging
    // =========================================================
    function showMessage(target, text, type = "error") {
      target.textContent = text;
      target.className = `message ${type}`;
      target.style.display = "block";
      clearTimeout(target._timer);
      target._timer = setTimeout(() => { target.style.display = "none"; }, 4000);
    }

    // =========================================================
    // Screen switching
    // =========================================================
    function showAuthScreen() {
      taskScreen.classList.add("hidden");
      authScreen.classList.remove("hidden");
    }

    function showTaskScreen() {
      authScreen.classList.add("hidden");
      taskScreen.classList.remove("hidden");
      usernameLabel.textContent = getUsername() || "";
      fetchUsers();
      fetchTasks();
    }

    async function fetchUsers() {
      try {
        const res = await apiFetch("/users");
        if (!res.ok) throw new Error("Failed to load users");
        const users = await res.json();
        const select = document.getElementById("assignTo");
        select.innerHTML = '<option value="">Unassigned</option>';
        for (const u of users) {
          const opt = document.createElement("option");
          opt.value = u.id;
          opt.textContent = u.username;
          select.appendChild(opt);
        }
      } catch (err) {
        if (err.message !== "Unauthorized") {
          showMessage(taskMessage, "Could not load users list", "error");
        }
      }
    }

    // =========================================================
    // Auth: tab switching
    // =========================================================
    authTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        authTabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        authMessage.style.display = "none";
        if (tab.dataset.mode === "login") {
          loginForm.classList.remove("hidden");
          registerForm.classList.add("hidden");
        } else {
          registerForm.classList.remove("hidden");
          loginForm.classList.add("hidden");
        }
      });
    });

    // =========================================================
    // Auth: login
    // =========================================================
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Login failed");
        setToken(data.token);
        setUsername(data.username);
        setUserId(data.user_id);
        loginForm.reset();
        showTaskScreen();
      } catch (err) {
        showMessage(authMessage, err.message, "error");
      }
    });

    // =========================================================
    // Auth: register
    // =========================================================
    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("registerUsername").value.trim();
      const password = document.getElementById("registerPassword").value;
      try {
        const res = await fetch(`${API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Registration failed");
        showMessage(authMessage, "Account created! You can now log in.", "success");
        registerForm.reset();
        // Switch to login tab
        document.querySelector('.auth-tab[data-mode="login"]').click();
      } catch (err) {
        showMessage(authMessage, err.message, "error");
      }
    });

    // =========================================================
    // Logout
    // =========================================================
    logoutBtn.addEventListener("click", () => {
      clearToken();
      showAuthScreen();
    });

    // =========================================================
    // Authenticated fetch wrapper
    // =========================================================
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API}${path}`, {
        ...options,
        headers: authHeaders(options.headers || {}),
      });
      if (res.status === 401) {
        clearToken();
        showAuthScreen();
        showMessage(authMessage, "Session expired. Please log in again.", "error");
        throw new Error("Unauthorized");
      }
      return res;
    }

    // =========================================================
    // Tasks
    // =========================================================
    async function fetchTasks() {
      try {
        const res = await apiFetch("/tasks");
        if (!res.ok) throw new Error("Failed to load tasks");
        const tasks = await res.json();
        renderTasks(tasks);
      } catch (err) {
        if (err.message !== "Unauthorized") {
          showMessage(taskMessage, err.message + " — is the Flask backend running?", "error");
        }
      }
    }

    function formatDueDate(isoString) {
      // isoString: "YYYY-MM-DD"
      const [y, m, d] = isoString.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${d} ${months[m - 1]} ${y}`;
    }

    function classifyDueDate(isoString) {
      const [y, m, d] = isoString.split("-").map(Number);
      const due = new Date(y, m - 1, d);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      due.setHours(0, 0, 0, 0);
      if (due.getTime() < today.getTime()) return "overdue";
      if (due.getTime() === today.getTime()) return "today";
      return "future";
    }

    function renderTasks(tasks) {
      taskList.innerHTML = "";
      if (!tasks.length) {
        taskList.innerHTML = `<div class="glass-card empty">No tasks yet. Add one above!</div>`;
        return;
      }
      for (const t of tasks) {
        const card = document.createElement("div");
        card.className = "glass-card task-card";
        let dueHtml = "";
        if (t.due_date) {
          const cls = classifyDueDate(t.due_date);
          dueHtml = `<span class="task-due ${cls}">📅 Due: ${formatDueDate(t.due_date)}</span>`;
        }
        let assigneeHtml = "";
        if (t.assigned_to) {
          assigneeHtml = `<span class="task-assignee">👤 Assigned: ${escapeHtml(t.assigned_to.username)}</span>`;
        }
        const metaHtml = (dueHtml || assigneeHtml)
          ? `<div class="task-meta">${dueHtml}${assigneeHtml}</div>`
          : "";
        const assignedId = t.assigned_to ? t.assigned_to.id : "";
        const isOwner = t.user_id === getUserId();
        card.innerHTML = `
          <div class="task-info">
            <div class="task-head">
              <span class="task-id">#${t.id}</span>
              <span class="task-title">${escapeHtml(t.title)}</span>
              <span class="badge status-${t.status}">${t.status}</span>
            </div>
            ${t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : ""}
            ${metaHtml}
          </div>
          <div class="actions">
            <button class="btn-status" data-id="${t.id}" data-status="${t.status}" data-due="${t.due_date || ''}" data-assigned="${assignedId}" data-owner="${isOwner ? '1' : '0'}">Change Status</button>
            <button class="btn-delete" data-id="${t.id}">Delete</button>
          </div>
        `;
        taskList.appendChild(card);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    taskForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const dueDateValue = document.getElementById("dueDate").value;
      const assignToValue = document.getElementById("assignTo").value;
      const payload = {
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        status: document.getElementById("status").value,
        due_date: dueDateValue || null,
        assigned_to: assignToValue ? parseInt(assignToValue, 10) : null,
      };
      try {
        const res = await apiFetch("/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "Failed to create task");
        }
        taskForm.reset();
        fetchTasks();
      } catch (err) {
        if (err.message !== "Unauthorized") showMessage(taskMessage, err.message, "error");
      }
    });

    taskList.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const id = btn.dataset.id;

      if (btn.classList.contains("btn-delete")) {
        if (!confirm("Delete this task?")) return;
        try {
          const res = await apiFetch(`/tasks/${id}`, { method: "DELETE" });
          if (!res.ok) throw new Error("Failed to delete task");
          fetchTasks();
        } catch (err) {
          if (err.message !== "Unauthorized") showMessage(taskMessage, err.message, "error");
        }
      } else if (btn.classList.contains("btn-status")) {
        const current = btn.dataset.status;
        const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length];
        const existingDue = btn.dataset.due || null;
        const existingAssigned = btn.dataset.assigned
          ? parseInt(btn.dataset.assigned, 10)
          : null;
        const isOwner = btn.dataset.owner === "1";
        const body = { status: next, due_date: existingDue };
        // Only owners are allowed to send assigned_to; include it so it isn't cleared
        if (isOwner) body.assigned_to = existingAssigned;
        try {
          const res = await apiFetch(`/tasks/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) throw new Error("Failed to update status");
          fetchTasks();
        } catch (err) {
          if (err.message !== "Unauthorized") showMessage(taskMessage, err.message, "error");
        }
      }
    });

    // =========================================================
    // Boot
    // =========================================================
    if (getToken()) {
      showTaskScreen();
    } else {
      showAuthScreen();
    }
  </script>
</body>
</html>
